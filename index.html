<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Palm Stack Level 1</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 46%, #020617 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }
    .app {
      width: min(100%, 440px);
      min-height: 100vh;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    header { text-align: center; }
    h1 { margin: 0; font-size: 28px; letter-spacing: -0.04em; }
    .subtitle { margin: 6px 0 0; color: #cbd5e1; font-size: 13px; line-height: 1.45; }
    .stage-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: #020617;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      aspect-ratio: 9 / 16;
      border: 1px solid rgba(255,255,255,0.12);
      touch-action: none;
      user-select: none;
    }
    video, canvas, .placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    video {
      opacity: 0.34;
      transform: scaleX(-1);
      background: #020617;
    }
    #gameCanvas { z-index: 2; }
    .placeholder {
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 28px;
      color: #94a3b8;
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(2,6,23,0.95));
    }
    .placeholder-icon {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.24);
      display: grid;
      place-items: center;
      font-size: 34px;
      background: rgba(255,255,255,0.06);
    }
    .badge {
      position: absolute;
      z-index: 4;
      top: 12px;
      left: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.74);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(12px);
      color: #e2e8f0;
      font-size: 12px;
    }
    .message {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: min(86%, 320px);
      padding: 18px 16px;
      border-radius: 24px;
      text-align: center;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.5);
      display: none;
    }
    .message strong { display: block; font-size: 28px; margin-bottom: 6px; }
    .message span { color: #cbd5e1; font-size: 13px; line-height: 1.45; }
    .controls { display: grid; gap: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      appearance: none;
      border: 0;
      min-height: 48px;
      border-radius: 999px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.42; cursor: not-allowed; }
    .primary { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .active { background: linear-gradient(135deg, #0891b2, #2563eb); }
    .status {
      min-height: 22px;
      color: #cbd5e1;
      text-align: center;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
    }
    .panel {
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.65;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px 14px;
    }
    .panel strong { color: #e2e8f0; }
    .checks { margin: 0; padding-left: 18px; }
    .checks li.pass { color: #86efac; }
    .checks li.warn { color: #fde68a; }
    .checks li.fail { color: #fca5a5; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Palm Stack</h1>
      <p class="subtitle">手のひらを左右に動かして、落ちてくるブロックを積み上げるゲーム</p>
    </header>

    <section class="stage-wrap" id="stageWrap">
      <video id="video" autoplay playsinline muted class="hidden"></video>
      <canvas id="gameCanvas"></canvas>
      <div class="badge" id="badge">Ready</div>
      <div class="message" id="messageBox">
        <strong id="messageTitle">Palm Stack</strong>
        <span id="messageText">カメラ起動後、手のひらを左右に動かしてください。</span>
      </div>
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">✋</div>
        <div id="placeholderText">カメラを起動して<br>手のひらを土台にしよう</div>
      </div>
    </section>

    <section class="controls">
      <button class="primary" id="startBtn">カメラを起動して開始</button>
      <div class="row">
        <button id="restartBtn">リスタート</button>
        <button id="modeBtn" class="active">Palm Mode ON</button>
      </div>
      <div class="row">
        <button id="switchBtn" disabled>カメラ切替</button>
        <button id="dropBtn">手動で落とす</button>
      </div>
      <div class="status" id="status">HTTPSまたはlocalhostでカメラが使えます。テスト時は画面を指で左右に動かせます。</div>
    </section>

    <section class="panel">
      <strong>ルール</strong><br>
      ブロックが土台またはタワーの中心に近ければ積めます。少しズレるとGOOD、ピッタリだとPERFECT。大きくズレるとMISSでゲームオーバーです。10個積めたらクリアです。
    </section>

    <section class="panel">
      <strong>Self Test</strong>
      <ul class="checks" id="checks"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    const stageWrap = document.getElementById('stageWrap');
    const video = document.getElementById('video');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const placeholderText = document.getElementById('placeholderText');
    const badge = document.getElementById('badge');
    const messageBox = document.getElementById('messageBox');
    const messageTitle = document.getElementById('messageTitle');
    const messageText = document.getElementById('messageText');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const modeBtn = document.getElementById('modeBtn');
    const switchBtn = document.getElementById('switchBtn');
    const dropBtn = document.getElementById('dropBtn');
    const statusEl = document.getElementById('status');
    const checks = document.getElementById('checks');

    const game = {
      w: 0,
      h: 0,
      running: false,
      over: false,
      clear: false,
      score: 0,
      combo: 0,
      targetScore: 10,
      platformX: 0,
      targetPlatformX: 0,
      platformY: 0,
      platformW: 112,
      platformH: 18,
      palmSeen: false,
      lastPalmAt: 0,
      blocks: [],
      falling: null,
      particles: [],
      flashText: '',
      flashLife: 0,
      cameraFacing: 'user',
      palmMode: true,
      manualControl: true,
      nextDropAt: 0,
      lastTime: 0
    };

    let stream = null;
    let hands = null;
    let detectionLoopId = null;
    let animationId = null;

    function isSecureCameraContext() {
      return window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    }

    function setStatus(text) { statusEl.textContent = text; }

    function resizeCanvas() {
      const rect = stageWrap.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      game.w = rect.width;
      game.h = rect.height;
      game.platformY = game.h * 0.84;
      if (!game.platformX) game.platformX = game.w / 2;
      if (!game.targetPlatformX) game.targetPlatformX = game.w / 2;
      clampPlatform();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function clampPlatform() {
      const half = game.platformW / 2;
      game.targetPlatformX = clamp(game.targetPlatformX, half + 8, game.w - half - 8);
      game.platformX = clamp(game.platformX, half + 8, game.w - half - 8);
    }

    function showMessage(title, text) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      messageBox.style.display = 'block';
    }

    function hideMessage() {
      messageBox.style.display = 'none';
    }

    function showPlaceholder(text) {
      placeholderText.innerHTML = text;
      placeholder.classList.remove('hidden');
    }

    function hidePlaceholder() {
      placeholder.classList.add('hidden');
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function createBlock() {
      const width = rand(58, 92);
      const height = 26;
      const colors = ['#38bdf8', '#a78bfa', '#fb7185', '#fbbf24', '#34d399'];
      return {
        x: rand(width / 2 + 12, game.w - width / 2 - 12),
        y: -height - 12,
        w: width,
        h: height,
        vy: rand(2.0, 2.7) + game.score * 0.08,
        color: colors[Math.floor(Math.random() * colors.length)],
        landed: false,
        angle: rand(-0.035, 0.035)
      };
    }

    function resetGame() {
      resizeCanvas();
      game.running = true;
      game.over = false;
      game.clear = false;
      game.score = 0;
      game.combo = 0;
      game.blocks = [];
      game.particles = [];
      game.falling = createBlock();
      game.flashText = 'STACK 10 BLOCKS';
      game.flashLife = 95;
      game.platformX = game.w / 2;
      game.targetPlatformX = game.w / 2;
      game.nextDropAt = 0;
      hideMessage();
      hidePlaceholder();
      badge.textContent = game.palmMode ? 'Palm Mode' : 'Touch Mode';
      setStatus(game.palmMode ? '手のひらを左右に動かして土台を操作してください。' : '画面を指で左右に動かして土台を操作してください。');
      ensureAnimation();
    }

    function towerTopY() {
      return game.platformY - game.blocks.length * 28;
    }

    function towerCenterX() {
      if (game.blocks.length === 0) return game.platformX;
      return game.blocks[game.blocks.length - 1].x;
    }

    function addParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        game.particles.push({
          x, y,
          vx: rand(-2.5, 2.5),
          vy: rand(-4, -1),
          life: rand(28, 46),
          color,
          size: rand(3, 7)
        });
      }
    }

    function settleBlock(block, rating) {
      const level = game.blocks.length;
      block.y = game.platformY - game.platformH / 2 - block.h / 2 - level * 28;
      block.x = towerCenterX() * 0.62 + block.x * 0.38;
      block.landed = true;
      game.blocks.push(block);
      game.score += 1;
      game.combo = rating === 'PERFECT' ? game.combo + 1 : 0;
      game.flashText = rating;
      game.flashLife = 55;
      addParticles(block.x, block.y, block.color, rating === 'PERFECT' ? 22 : 12);
      if (game.score >= game.targetScore) {
        game.clear = true;
        game.running = false;
        game.flashText = 'CLEAR!';
        game.flashLife = 200;
        addParticles(block.x, block.y, '#86efac', 60);
        showMessage('CLEAR!', '10個積めました。リスタートでもう一度遊べます。');
        badge.textContent = 'Clear';
        setStatus('クリア！10個積めました。');
      } else {
        game.falling = createBlock();
      }
    }

    function missBlock() {
      game.over = true;
      game.running = false;
      game.flashText = 'MISS!';
      game.flashLife = 160;
      addParticles(game.falling.x, game.falling.y, '#f87171', 30);
      showMessage('GAME OVER', `${game.score}個積めました。中心からズレすぎました。`);
      badge.textContent = 'Game Over';
      setStatus(`ゲームオーバー。${game.score}個積めました。`);
    }

    function updateGame() {
      game.platformX += (game.targetPlatformX - game.platformX) * 0.22;
      clampPlatform();

      if (game.running && game.falling) {
        game.falling.y += game.falling.vy;
        const landingY = towerTopY() - game.falling.h / 2;
        if (game.falling.y >= landingY) {
          const baseX = towerCenterX();
          const offset = Math.abs(game.falling.x - baseX);
          const perfectRange = 14;
          const safeRange = Math.max(34, Math.min(game.falling.w, game.platformW) * 0.52);
          if (offset <= perfectRange) settleBlock(game.falling, 'PERFECT');
          else if (offset <= safeRange) settleBlock(game.falling, 'GOOD');
          else missBlock();
        }
      }

      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.14;
        p.life -= 1;
        if (p.life <= 0) game.particles.splice(i, 1);
      }

      if (game.flashLife > 0) game.flashLife -= 1;
    }

    function drawRoundedRect(x, y, w, h, r, color, stroke) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.roundRect(-w / 2, -h / 2, w, h, r);
      ctx.fillStyle = color;
      ctx.fill();
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, game.h);
      g.addColorStop(0, 'rgba(15,23,42,0.2)');
      g.addColorStop(1, 'rgba(2,6,23,0.82)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, game.w, game.h);

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let y = 60; y < game.h; y += 42) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(game.w, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHUD() {
      ctx.save();
      ctx.fillStyle = 'rgba(15,23,42,0.74)';
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(game.w - 116, 12, 104, 44, 16);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '800 20px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(`${game.score}/${game.targetScore}`, game.w - 64, 40);

      ctx.fillStyle = 'rgba(15,23,42,0.74)';
      ctx.beginPath();
      ctx.roundRect(12, game.h - 46, game.w - 24, 34, 17);
      ctx.fill();
      ctx.fillStyle = game.palmSeen ? '#86efac' : '#fcd34d';
      ctx.font = '750 12px system-ui';
      ctx.textAlign = 'center';
      const modeText = game.palmMode ? (game.palmSeen ? 'Palm detected: move your hand left/right' : 'Show your palm or drag screen to test') : 'Touch mode: drag screen left/right';
      ctx.fillText(modeText, game.w / 2, game.h - 24);
      ctx.restore();
    }

    function drawPlatform() {
      const glow = ctx.createRadialGradient(game.platformX, game.platformY, 4, game.platformX, game.platformY, 90);
      glow.addColorStop(0, game.palmSeen || !game.palmMode ? 'rgba(34,197,94,0.36)' : 'rgba(250,204,21,0.28)');
      glow.addColorStop(1, 'rgba(34,197,94,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(game.platformX - 100, game.platformY - 70, 200, 120);
      drawRoundedRect(game.platformX, game.platformY, game.platformW, game.platformH, 9, game.palmSeen || !game.palmMode ? '#22c55e' : '#facc15', 'rgba(255,255,255,0.6)');
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = '900 13px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('PALM', game.platformX, game.platformY + 5);
      ctx.restore();
    }

    function drawBlock(block, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(block.x, block.y);
      ctx.rotate(block.angle || 0);
      ctx.shadowColor = block.color;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.roundRect(-block.w / 2, -block.h / 2, block.w, block.h, 8);
      ctx.fillStyle = block.color;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.62)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillRect(-block.w / 2 + 8, -block.h / 2 + 5, block.w - 16, 4);
      ctx.restore();
    }

    function drawTowerGuide() {
      const x = towerCenterX();
      const top = towerTopY();
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.setLineDash([5, 7]);
      ctx.beginPath();
      ctx.moveTo(x, top - 44);
      ctx.lineTo(x, game.platformY + 18);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.save();
        ctx.globalAlpha = clamp(p.life / 38, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFlashText() {
      if (game.flashLife <= 0 || !game.flashText) return;
      ctx.save();
      ctx.globalAlpha = clamp(game.flashLife / 45, 0, 1);
      ctx.font = '950 34px system-ui';
      ctx.textAlign = 'center';
      ctx.lineWidth = 8;
      ctx.strokeStyle = 'rgba(2,6,23,0.85)';
      ctx.fillStyle = game.flashText.includes('MISS') ? '#fb7185' : game.flashText.includes('PERFECT') ? '#facc15' : '#ffffff';
      ctx.strokeText(game.flashText, game.w / 2, game.h * 0.25);
      ctx.fillText(game.flashText, game.w / 2, game.h * 0.25);
      ctx.restore();
    }

    function render() {
      updateGame();
      drawBackground();
      drawHUD();
      drawTowerGuide();
      drawPlatform();
      for (const block of game.blocks) drawBlock(block);
      if (game.falling && !game.clear) drawBlock(game.falling);
      drawParticles();
      drawFlashText();
      animationId = requestAnimationFrame(render);
    }

    function ensureAnimation() {
      if (!animationId) animationId = requestAnimationFrame(render);
    }

    async function initHands() {
      if (hands) return true;
      if (!window.Hands) {
        setStatus('MediaPipe Handsを読み込めませんでした。画面ドラッグでテストできます。');
        return false;
      }
      hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.62
      });
      hands.onResults(onHandsResults);
      return true;
    }

    async function startDetectionLoop() {
      if (!stream || !game.palmMode) return;
      const ok = await initHands();
      if (!ok) return;
      stopDetectionLoop();
      const detect = async () => {
        if (!stream || !game.palmMode) return;
        if (video.readyState >= 2) {
          try { await hands.send({ image: video }); } catch (error) { console.error(error); }
        }
        detectionLoopId = requestAnimationFrame(detect);
      };
      detectionLoopId = requestAnimationFrame(detect);
    }

    function stopDetectionLoop() {
      if (detectionLoopId) {
        cancelAnimationFrame(detectionLoopId);
        detectionLoopId = null;
      }
    }

    function stopCamera() {
      stopDetectionLoop();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function fingerExtended(landmarks, tip, pip) {
      return landmarks[tip].y < landmarks[pip].y;
    }

    function isOpenPalm(landmarks) {
      if (!landmarks || landmarks.length < 21) return false;
      const count = [
        fingerExtended(landmarks, 8, 6),
        fingerExtended(landmarks, 12, 10),
        fingerExtended(landmarks, 16, 14),
        fingerExtended(landmarks, 20, 18)
      ].filter(Boolean).length;
      const tall = Math.abs(landmarks[12].y - landmarks[0].y) > 0.15;
      return count >= 3 && tall;
    }

    function onHandsResults(results) {
      const landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];
      if (!landmarks || !isOpenPalm(landmarks)) {
        game.palmSeen = false;
        if (game.palmMode) badge.textContent = 'Show Palm';
        return;
      }
      const palmX = landmarks[9].x;
      game.palmSeen = true;
      game.lastPalmAt = Date.now();
      game.targetPlatformX = (1 - palmX) * game.w;
      clampPlatform();
      if (game.palmMode) badge.textContent = 'Palm Tracking';
    }

    async function requestCamera(facing) {
      const constraints = {
        video: {
          facingMode: { ideal: facing },
          width: { ideal: 960 },
          height: { ideal: 1280 }
        },
        audio: false
      };
      try {
        return await navigator.mediaDevices.getUserMedia(constraints);
      } catch (error) {
        if (error.name === 'OverconstrainedError' || error.name === 'ConstraintNotSatisfiedError') {
          return await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
        throw error;
      }
    }

    function describeCameraError(error) {
      const name = error && error.name ? error.name : 'UnknownError';
      if (name === 'NotAllowedError' || name === 'SecurityError') {
        if (!isSecureCameraContext()) return 'HTTPSまたはlocalhostで開いてください。カメラがブロックされています。';
        return 'カメラ許可が拒否されています。ブラウザ設定からカメラを許可してください。画面ドラッグでテストはできます。';
      }
      if (name === 'NotFoundError') return 'カメラが見つかりません。画面ドラッグでテストできます。';
      return 'カメラを起動できませんでした: ' + name + '。画面ドラッグでテストできます。';
    }

    async function startCameraAndGame() {
      resetGame();
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showPlaceholder('このブラウザはカメラ非対応です<br>画面ドラッグで遊べます');
        setStatus('カメラ非対応です。画面を指で左右に動かしてテストしてください。');
        return;
      }
      if (!isSecureCameraContext()) {
        showPlaceholder('HTTPSまたはlocalhostで<br>カメラが使えます');
        setStatus('安全な接続ではないためカメラは使えません。画面ドラッグでテストできます。');
        return;
      }
      try {
        setStatus('カメラを起動中...');
        stream = await requestCamera(game.cameraFacing);
        video.srcObject = stream;
        await video.play();
        video.classList.remove('hidden');
        hidePlaceholder();
        switchBtn.disabled = false;
        setStatus('手のひらを左右に動かして土台を操作してください。');
        if (game.palmMode) await startDetectionLoop();
      } catch (error) {
        console.error(error);
        stopCamera();
        showPlaceholder('カメラ起動に失敗<br>画面ドラッグで遊べます');
        setStatus(describeCameraError(error));
      }
    }

    async function switchCamera() {
      game.cameraFacing = game.cameraFacing === 'user' ? 'environment' : 'user';
      await startCameraAndGame();
    }

    function toggleMode() {
      game.palmMode = !game.palmMode;
      modeBtn.textContent = game.palmMode ? 'Palm Mode ON' : 'Touch Mode';
      modeBtn.classList.toggle('active', game.palmMode);
      game.palmSeen = false;
      if (game.palmMode && stream) startDetectionLoop();
      else stopDetectionLoop();
      badge.textContent = game.palmMode ? 'Palm Mode' : 'Touch Mode';
      setStatus(game.palmMode ? '手のひらで操作します。画面ドラッグも予備操作として使えます。' : '画面ドラッグで操作します。');
    }

    function manualDrop() {
      if (!game.falling || !game.running) return;
      game.falling.x = towerCenterX();
      game.falling.y = towerTopY() - game.falling.h / 2;
    }

    function pointerToPlatform(clientX) {
      const rect = stageWrap.getBoundingClientRect();
      game.targetPlatformX = clientX - rect.left;
      clampPlatform();
      game.manualControl = true;
    }

    stageWrap.addEventListener('pointerdown', event => {
      stageWrap.setPointerCapture(event.pointerId);
      pointerToPlatform(event.clientX);
    });
    stageWrap.addEventListener('pointermove', event => pointerToPlatform(event.clientX));

    function addCheck(label, state, detail) {
      const li = document.createElement('li');
      li.className = state;
      li.textContent = `${label}: ${detail}`;
      checks.appendChild(li);
    }

    function runTests() {
      checks.innerHTML = '';
      addCheck('Secure context', isSecureCameraContext() ? 'pass' : 'warn', isSecureCameraContext() ? 'OK' : 'カメラはHTTPS/localhostのみ');
      addCheck('Canvas', canvas.getContext ? 'pass' : 'fail', canvas.getContext ? 'OK' : '未対応');
      addCheck('getUserMedia', navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'pass' : 'warn', navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'OK' : 'カメラ非対応');
      addCheck('MediaPipe Hands', window.Hands ? 'pass' : 'warn', window.Hands ? '読み込み済み' : '未読み込み');
      const oldW = game.w || 390;
      const oldH = game.h || 690;
      game.w = oldW;
      game.h = oldH;
      game.platformY = oldH * 0.84;
      game.platformX = oldW / 2;
      game.blocks = [];
      const firstTop = towerTopY();
      game.blocks.push({x: oldW / 2, y: firstTop - 13, w: 70, h: 26});
      addCheck('Tower top updates', towerTopY() < firstTop ? 'pass' : 'fail', towerTopY() < firstTop ? 'OK' : '積み上げ高さが更新されません');
      const fakePalm = [
        [0.5,0.85],[0.48,0.72],[0.46,0.65],[0.44,0.6],[0.42,0.55],
        [0.44,0.64],[0.43,0.49],[0.42,0.35],[0.41,0.22],
        [0.5,0.62],[0.5,0.46],[0.5,0.3],[0.5,0.16],
        [0.56,0.64],[0.58,0.5],[0.6,0.36],[0.62,0.24],
        [0.61,0.68],[0.66,0.55],[0.7,0.43],[0.74,0.33]
      ].map(([x,y]) => ({x,y,z:0}));
      addCheck('Open palm heuristic', isOpenPalm(fakePalm) ? 'pass' : 'fail', isOpenPalm(fakePalm) ? 'OK' : '開いた手を検出できません');
      game.blocks = [];
    }

    startBtn.addEventListener('click', startCameraAndGame);
    restartBtn.addEventListener('click', resetGame);
    modeBtn.addEventListener('click', toggleMode);
    switchBtn.addEventListener('click', switchCamera);
    dropBtn.addEventListener('click', manualDrop);
    window.addEventListener('resize', () => { resizeCanvas(); runTests(); });
    window.addEventListener('beforeunload', stopCamera);

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
        this.moveTo(x + radius, y);
        this.arcTo(x + w, y, x + w, y + h, radius);
        this.arcTo(x + w, y + h, x, y + h, radius);
        this.arcTo(x, y + h, x, y, radius);
        this.arcTo(x, y, x + w, y, radius);
        return this;
      };
    }

    resizeCanvas();
    runTests();
    ensureAnimation();
    showMessage('Palm Stack', '手のひらを左右に動かして、10個のブロックを積み上げよう。');
  </script>
</body>
</html>
